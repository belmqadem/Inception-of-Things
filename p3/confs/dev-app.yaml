apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: valarmo-playground
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/belmqadem/abel-mqa-iot
    targetRevision: HEAD
    path: manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
